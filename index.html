<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ระบบออมเงินนักเรียน</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Sarabun',sans-serif;background:#f0f4f8;color:#1e293b;min-height:100vh;}
input,select,button,textarea{font-family:'Sarabun',sans-serif;}
:root{
  --blue:#1a3a6b;--blue2:#0f6eb5;--blue-light:#eff6ff;--blue-border:#bfdbfe;
  --green:#16a34a;--green-light:#dcfce7;
  --red:#dc2626;--red-light:#fee2e2;
  --yellow:#d97706;--yellow-light:#fef3c7;
  --gray:#64748b;--gray-light:#f1f5f9;--gray-border:#e2e8f0;
  --white:#fff;--text:#1e293b;--subtext:#94a3b8;
  --sidebar:220px;--radius:14px;--shadow:0 2px 8px rgba(0,0,0,0.08);
}
/* LAYOUT */
#app{display:flex;min-height:100vh;}
#sidebar{width:var(--sidebar);background:linear-gradient(180deg,#1a3a6b 0%,#0d2453 100%);min-height:100vh;display:flex;flex-direction:column;flex-shrink:0;position:fixed;left:0;top:0;bottom:0;z-index:100;transition:.25s;}
#content{margin-left:var(--sidebar);flex:1;padding:24px;min-height:100vh;overflow-y:auto;}
/* SIDEBAR */
.sb-logo{padding:22px 18px 16px;border-bottom:1px solid rgba(255,255,255,.1);}
.sb-logo .logo-icon{font-size:28px;margin-bottom:6px;}
.sb-logo .logo-title{color:#fff;font-weight:800;font-size:14px;line-height:1.3;}
.sb-logo .logo-sub{color:#93c5fd;font-size:11px;margin-top:2px;}
nav{padding:10px;flex:1;}
.nav-btn{width:100%;display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:10px;border:none;cursor:pointer;margin-bottom:3px;background:transparent;color:#93c5fd;font-family:inherit;font-size:13px;font-weight:500;transition:.15s;text-align:left;}
.nav-btn:hover{background:rgba(255,255,255,.1);color:#fff;}
.nav-btn.active{background:rgba(255,255,255,.17);color:#fff;font-weight:700;}
.nav-icon{font-size:17px;width:22px;text-align:center;}
.sb-user{padding:14px 18px;border-top:1px solid rgba(255,255,255,.1);}
.sb-user .role-label{color:#93c5fd;font-size:11px;}
.sb-user .user-name{color:#fff;font-weight:700;font-size:13px;margin-top:2px;margin-bottom:10px;}
/* CARDS */
.card{background:#fff;border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);border:1px solid var(--gray-border);margin-bottom:16px;}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px;}
.stat-card{background:#fff;border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);border:1px solid var(--gray-border);}
.stat-card .icon{font-size:26px;margin-bottom:8px;}
.stat-card .val{font-size:22px;font-weight:800;color:var(--text);}
.stat-card .lbl{font-size:13px;color:var(--gray);margin-top:2px;}
.stat-card .sub{font-size:11px;color:var(--subtext);margin-top:2px;}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:10px;cursor:pointer;font-family:inherit;font-weight:700;transition:opacity .15s;padding:10px 18px;font-size:14px;}
.btn:hover{opacity:.88;}
.btn:active{transform:scale(.98);}
.btn-primary{background:linear-gradient(135deg,#1a3a6b,#0f6eb5);color:#fff;}
.btn-success{background:linear-gradient(135deg,#16a34a,#15803d);color:#fff;}
.btn-danger{background:linear-gradient(135deg,#dc2626,#b91c1c);color:#fff;}
.btn-ghost{background:var(--gray-light);color:#374151;}
.btn-outline{background:#fff;color:var(--blue);border:1.5px solid var(--blue-border);}
.btn-sm{padding:6px 14px;font-size:13px;border-radius:8px;}
.btn-lg{padding:14px 24px;font-size:16px;border-radius:12px;}
.btn-full{width:100%;}
/* INPUTS */
.form-group{margin-bottom:14px;}
.form-label{font-size:13px;font-weight:700;color:#374151;display:block;margin-bottom:5px;}
.form-label .req{color:var(--red);}
.form-input,.form-select{width:100%;padding:11px 14px;border:2px solid var(--gray-border);border-radius:10px;font-size:14px;outline:none;font-family:inherit;background:#fff;transition:border-color .15s;}
.form-input:focus,.form-select:focus{border-color:var(--blue2);}
/* TABLE */
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;min-width:500px;}
thead tr{background:var(--gray-light);}
th{padding:10px 12px;font-size:12px;color:var(--gray);font-weight:700;text-align:left;border-bottom:2px solid var(--gray-border);white-space:nowrap;}
td{padding:10px 12px;font-size:13px;border-bottom:1px solid #f8fafc;vertical-align:middle;}
tr:hover td{background:#f8fafc;}
.empty-row td{text-align:center;color:var(--subtext);font-size:14px;padding:32px;}
/* BADGE */
.badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:12px;font-weight:700;}
.badge-deposit{background:var(--green-light);color:var(--green);}
.badge-withdraw{background:var(--red-light);color:var(--red);}
.badge-pending{background:var(--yellow-light);color:var(--yellow);}
.badge-approved{background:var(--green-light);color:var(--green);}
.badge-rejected{background:var(--red-light);color:var(--red);}
.badge-active{background:var(--green-light);color:var(--green);}
.badge-role{background:var(--blue-light);color:var(--blue);}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal-box{background:#fff;border-radius:20px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,.25);}
.modal-head{padding:18px 24px;border-bottom:1px solid var(--gray-border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:1;}
.modal-head h3{font-size:17px;font-weight:800;color:var(--text);}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--subtext);line-height:1;}
.modal-body{padding:24px;}
/* TOAST */
.toast{position:fixed;top:20px;right:20px;z-index:9999;padding:13px 20px;border-radius:12px;font-weight:700;font-size:14px;box-shadow:0 8px 24px rgba(0,0,0,.2);animation:slideIn .25s ease;color:#fff;}
.toast-ok{background:var(--green);}
.toast-err{background:var(--red);}
@keyframes slideIn{from{transform:translateX(60px);opacity:0;}to{transform:translateX(0);opacity:1;}}
/* CHART */
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:100px;padding-top:8px;}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.bar-fill{width:100%;border-radius:4px 4px 0 0;background:var(--blue2);opacity:.85;min-height:2px;transition:height .4s;}
.bar-lbl{font-size:10px;color:var(--subtext);font-weight:500;}
/* PAGE HEADER */
.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.page-title{font-size:22px;font-weight:800;color:var(--text);}
.page-sub{font-size:13px;color:var(--gray);margin-top:3px;}
/* TWO COL */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
/* STUDENT PICKER */
.student-list-box{border:1.5px solid var(--gray-border);border-radius:10px;max-height:280px;overflow-y:auto;}
.student-row{padding:10px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;border-bottom:1px solid #f8fafc;background:#fff;transition:.1s;}
.student-row:hover{background:#f8fafc;}
.student-row.selected{background:var(--blue-light);}
/* QUICK AMOUNT BTNS */
.amount-quick{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.amount-quick button{flex:1;min-width:60px;padding:8px;border-radius:8px;border:1.5px solid var(--gray-border);background:#f8fafc;color:#374151;font-family:inherit;font-weight:700;font-size:13px;cursor:pointer;transition:.1s;}
.amount-quick button.active,.amount-quick button:hover{background:var(--blue);color:#fff;border-color:var(--blue);}
/* LOGIN */
#login-page{min-height:100vh;background:linear-gradient(135deg,#1a3a6b 0%,#0f6eb5 60%,#38bdf8 100%);display:flex;align-items:center;justify-content:center;padding:20px;}
.login-box{background:#fff;border-radius:24px;padding:40px 36px;width:100%;max-width:440px;box-shadow:0 24px 60px rgba(0,0,0,.25);}
.login-logo{text-align:center;margin-bottom:28px;}
.login-logo .emoji{font-size:52px;display:block;margin-bottom:8px;}
.login-logo h1{font-size:22px;font-weight:800;color:var(--blue);}
.login-logo p{color:var(--gray);font-size:13px;margin-top:4px;}
.demo-btns{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;}
.demo-btn{padding:5px 10px;border-radius:8px;border:1.5px solid var(--gray-border);background:#f8fafc;color:#374151;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;}
.demo-btn:hover{background:var(--blue);color:#fff;border-color:var(--blue);}
/* INFO BOX */
.info-box{border-radius:10px;padding:10px 14px;font-size:13px;margin-bottom:14px;}
.info-box.yellow{background:var(--yellow-light);border:1.5px solid #fcd34d;color:#92400e;}
.info-box.green{background:var(--green-light);border:1.5px solid #86efac;color:#14532d;}
.info-box.blue{background:var(--blue-light);border:1.5px solid var(--blue-border);color:var(--blue);}
/* PROFILE */
.profile-hero{background:linear-gradient(160deg,#1a3a6b,#0f6eb5);border-radius:var(--radius);padding:28px;color:#fff;text-align:center;}
.profile-hero .av{font-size:64px;margin-bottom:10px;}
.profile-stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:16px 0;}
.profile-stat{border-radius:10px;padding:12px;text-align:center;}
/* SEARCH BAR */
.search-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;}
.search-input{flex:1;min-width:200px;padding:10px 14px;border:2px solid var(--gray-border);border-radius:10px;font-size:14px;outline:none;font-family:inherit;}
.search-input:focus{border-color:var(--blue2);}
/* TABS */
.tab-bar{display:flex;gap:8px;margin-bottom:20px;border-bottom:2px solid var(--gray-border);padding-bottom:0;}
.tab-btn{padding:10px 20px;border:none;background:transparent;font-family:inherit;font-size:14px;font-weight:600;color:var(--gray);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:.15s;}
.tab-btn.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:800;}
/* RESPONSIVE TABLET */
@media(max-width:900px){
  :root{--sidebar:64px;}
  .sb-logo .logo-title,.sb-logo .logo-sub,.nav-btn span,.sb-user .role-label,.sb-user .user-name{display:none;}
  .nav-btn{justify-content:center;padding:14px;}
  .sb-logo{padding:16px 12px;text-align:center;}
  .stat-grid{grid-template-columns:repeat(2,1fr);}
  .two-col{grid-template-columns:1fr;}
  .three-col{grid-template-columns:1fr 1fr;}
  #content{padding:16px;}
}
@media(max-width:600px){
  :root{--sidebar:0px;}
  #sidebar{display:none;}
  #content{margin-left:0;padding:12px;}
  .stat-grid{grid-template-columns:1fr 1fr;}
  .three-col{grid-template-columns:1fr;}
}
/* SCROLLBAR */
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:#f1f5f9;}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px;}
/* AMOUNT INPUT BIG */
.amount-big{width:100%;padding:14px;border:2px solid var(--gray-border);border-radius:10px;font-size:28px;font-weight:800;color:var(--blue);outline:none;text-align:center;font-family:inherit;}
.amount-big:focus{border-color:var(--blue2);}
/* CONFIRM BOX */
.confirm-box{background:#f0fdf4;border:1.5px solid #86efac;border-radius:10px;padding:12px 16px;margin-bottom:14px;}
.confirm-box.warn{background:#fff7ed;border-color:#fed7aa;}
.confirm-row{display:flex;justify-content:space-between;font-size:13px;color:var(--gray);margin-bottom:3px;}
.confirm-total{display:flex;justify-content:space-between;font-size:16px;font-weight:800;color:var(--green);margin-top:4px;}
.confirm-total.warn{color:#ea580c;}
/* PENDING BADGE */
.pending-count{background:var(--red);color:#fff;border-radius:20px;padding:1px 7px;font-size:11px;margin-left:4px;}
</style>
</head>
<body>

<div id="app"></div>

<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
// ══════════════════════════════════════════════════════
// STORAGE
// ══════════════════════════════════════════════════════
const LS = {
  get:(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
};

// ══════════════════════════════════════════════════════
// GOOGLE SHEETS SYNC (Apps Script)
// ★ วาง URL ของ Web App จาก Google Apps Script ตรงนี้ ★
// ══════════════════════════════════════════════════════
const API_URL = 'https://script.google.com/macros/s/AKfycbyaeLEr0RieI06Bk3Ni5OGPgE2B0_vpN2qqFuLPq3lJW7tbVQlbmnBc_p0c_eYT53QW/exec';

let syncTimer=null, syncBusy=false, syncQueued=false;
let cloudReady=false; // จะเป็น true ก็ต่อเมื่อยืนยันสถานะชีตแล้ว — กันการเขียนทับข้อมูลจริงด้วยข้อมูลตัวอย่าง

function setSyncStatus(status,text){
  let el=document.getElementById('sync-badge');
  if(!el){
    el=document.createElement('div');
    el.id='sync-badge';
    el.style.cssText='position:fixed;bottom:14px;right:14px;z-index:9998;padding:7px 14px;border-radius:20px;font-size:12px;font-weight:700;box-shadow:0 4px 12px rgba(0,0,0,.15);font-family:Sarabun,sans-serif;transition:.2s;max-width:min(92vw,360px);cursor:pointer;';
    el.title='แตะเพื่อบันทึก/เชื่อมต่อใหม่';
    el.onclick=async()=>{
      if(!cloudReady){ await cloudLoad(); }
      else { await cloudPush(); }
    };
    document.body.appendChild(el);
  }
  const styles={
    off:    ['#f1f5f9','#64748b','💾 บันทึกในเครื่องเท่านั้น'],
    syncing:['#fef3c7','#d97706','🔄 กำลังบันทึกลง Google Sheets...'],
    ok:     ['#dcfce7','#16a34a','☁️ บันทึกลง Google Sheets แล้ว'],
    error:  ['#fee2e2','#dc2626','⚠️ ซิงก์ไม่สำเร็จ — ข้อมูลยังอยู่ในเครื่อง'],
    loading:['#eff6ff','#0f6eb5','⏳ กำลังโหลดข้อมูลจาก Google Sheets...'],
  };
  const [bg,color,defText]=styles[status]||styles.off;
  el.style.background=bg; el.style.color=color;
  el.textContent=text||defText;
}

function persistLocal(){
  LS.set('sav_users',state.users);
  LS.set('sav_students',state.students);
  LS.set('sav_transactions',state.transactions);
  LS.set('sav_withdraw_requests',state.withdrawReqs);
  LS.set('sav_audit',state.audit);
}

// รายการที่ถูกลบ — ซิงก์ข้ามเครื่องผ่าน Audit Log (เครื่องอื่นอ่านแล้วรู้ว่าถูกลบ)
let deletedIds = LS.get('sav_deleted', []);
function delSet(){ return new Set(deletedIds.map(String)); }
function addTombstone(id){ if(id!=null && !deletedIds.map(String).includes(String(id))){ deletedIds.push(String(id)); LS.set('sav_deleted', deletedIds); } }
function dropTombstoned(arr){ const s=delSet(); return (arr||[]).filter(t=>t&&!s.has(String(t.id))); }
// อ่านรายการลบจาก Audit Log (ช่องทางซิงก์) มาเติมชุด deletedIds
function syncDeletedFromAudit(){
  let changed=false;
  (state.audit||[]).forEach(a=>{
    if(a && a.action==='DELETE_TX' && a.detail){
      const m=String(a.detail).match(/\[del:([^\]]+)\]/);
      if(m && !deletedIds.map(String).includes(String(m[1]))){ deletedIds.push(String(m[1])); changed=true; }
    }
  });
  if(changed) LS.set('sav_deleted', deletedIds);
}

function cloudPayload(){
  return {
    users: state.users,
    students: state.students,
    transactions: dropTombstoned(state.transactions),
    withdrawReqs: state.withdrawReqs,
    audit: state.audit,
  };
}

// GET — พิสูจน์แล้วว่าอ่านข้ามโดเมนได้เสมอ ใช้ทั้งโหลดและ "ยืนยันผลการเขียน"
async function cloudFetchAll(){
  const res=await fetch(API_URL+'?t='+Date.now(),{cache:'no-store'});
  return await res.json();
}

async function cloudPush(){
  if(!API_URL) return;
  if(!cloudReady){ // ยังไม่ยืนยันสถานะชีต → ไม่เขียน เพื่อไม่ให้ข้อมูลจริงถูกทับ
    setSyncStatus('error','⚠️ ยังเชื่อม Sheets ไม่ได้ — กดรีเฟรชหน้าเพื่อเชื่อมต่อก่อนบันทึก');
    return;
  }
  if(syncBusy){syncQueued=true;return;}
  syncBusy=true;
  setSyncStatus('syncing');
  try{
    // ★ อ่านข้อมูลล่าสุดจากชีตมารวมก่อนเขียน (กันการเขียนทับข้อมูลของเครื่องอื่นที่บันทึกพร้อมกัน)
    try{
      const remote=await cloudFetchAll();
      if(remote && Array.isArray(remote.users)){
        mergeRemoteInto(remote, true); // ยึดของในเครื่องก่อน + เติมของเครื่องอื่น + ปรับใช้รายการที่ลบ
      }
    }catch(e){ /* อ่านชีตไม่ได้ → เขียนด้วยข้อมูลในเครื่องล้วน */ }

    const payload=cloudPayload();
    await fetch(API_URL,{
      method:'POST',
      mode:'no-cors',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify(payload),
    });
    // ★ ยืนยันว่าชีตมีข้อมูล "อย่างน้อย" เท่าที่เราส่ง (เครื่องอื่นอาจเพิ่มเข้ามาระหว่างนั้น)
    let ok=false;
    for(const wait of [700,1400,2200]){
      await new Promise(r=>setTimeout(r,wait));
      try{
        const chk=await cloudFetchAll();
        if(chk && Array.isArray(chk.students) && Array.isArray(chk.transactions) &&
           chk.transactions.length>=payload.transactions.length &&
           chk.students.length>=payload.students.length){
          ok=true;break;
        }
      }catch(e){}
    }
    if(ok) setSyncStatus('ok');
    else setSyncStatus('error','⚠️ ข้อมูลอาจไม่ได้บันทึกลง Sheets! แตะป้ายนี้เพื่อลองใหม่ หรือตรวจการตั้งค่า Apps Script');
  }catch(err){
    console.error('Sync error:',err);
    setSyncStatus('error');
  }finally{
    syncBusy=false;
    if(syncQueued){syncQueued=false;setTimeout(cloudPush,200);}
  }
}

function cloudSave(){
  if(!API_URL){setSyncStatus('off');return;}
  clearTimeout(syncTimer);
  syncTimer=setTimeout(cloudPush,800); // รวมหลายรายการติดกันเป็นการบันทึกครั้งเดียว
}

// รวมข้อมูล 2 ชุดตาม id: ยึดของชีตเป็นหลัก แต่คงรายการที่มีเฉพาะในเครื่องไว้ (ไม่ลบทิ้ง)
function mergeById(remote,local){
  const map=new Map();
  (Array.isArray(remote)?remote:[]).forEach(o=>{if(o&&o.id!=null)map.set(String(o.id),o);});
  (Array.isArray(local)?local:[]).forEach(o=>{if(o&&o.id!=null&&!map.has(String(o.id)))map.set(String(o.id),o);});
  return [...map.values()];
}
// คำนวณยอดคงเหลือของนักเรียนจากรายการฝาก/ถอนจริง (เฉพาะคนที่มีรายการ — ไม่มีรายการคงยอดเดิมไว้ ป้องกันยอดเป็น 0)
function recomputeBalances(){
  const sum={},cnt={};
  (state.transactions||[]).forEach(t=>{
    if(!t||!t.studentId)return;
    const d=t.type==='withdraw'?-Number(t.amount||0):Number(t.amount||0);
    sum[t.studentId]=(sum[t.studentId]||0)+d;
    cnt[t.studentId]=(cnt[t.studentId]||0)+1;
  });
  state.students=(state.students||[]).map(s=>cnt[s.id]?{...s,balance:sum[s.id]}:s);
}
// รวมข้อมูลจากชีตเข้ากับข้อมูลในเครื่อง (preferLocal=true ตอนบันทึก, =false ตอนโหลด)
function mergeRemoteInto(remote, preferLocal){
  const pick=(localArr,remoteArr)=> preferLocal ? mergeById(localArr,remoteArr) : mergeById(remoteArr,localArr);
  state.users        = pick(state.users,        remote.users||[]);
  state.students     = pick(state.students,     remote.students||[]);
  state.transactions = pick(state.transactions, remote.transactions||[]);
  state.withdrawReqs = pick(state.withdrawReqs, remote.withdrawReqs||[]);
  state.audit        = pick(state.audit,        remote.audit||[]);
  syncDeletedFromAudit();                              // เรียนรู้รายการที่ถูกลบจากทุกเครื่อง
  state.transactions = dropTombstoned(state.transactions); // เอารายการที่ถูกลบออก
  recomputeBalances();
  purgeDemoStudents();
  persistLocal();
}

async function cloudLoad(){
  if(!API_URL) return false;
  setSyncStatus('loading');
  try{
    const data=await cloudFetchAll();
    if(!data || !Array.isArray(data.users)) throw new Error('รูปแบบข้อมูลไม่ถูกต้อง');
    const hasData=(data.users.length>0)||(Array.isArray(data.students)&&data.students.length>0);
    if(hasData){
      // ★ รวมแบบ merge (ยึดชีตเป็นหลัก) + เรียนรู้รายการที่ถูกลบ ไม่ทับข้อมูลในเครื่องด้วยของว่าง
      mergeRemoteInto(data, false);
      cloudReady=true;
      setSyncStatus('ok','☁️ เชื่อมต่อ Google Sheets แล้ว');
      // ต้องดันขึ้นชีตถ้า: ในเครื่องมีรายการที่ชีตยังไม่มี หรือ ชีตยังมีรายการที่ถูกลบไปแล้ว
      const remoteTxIds=new Set((data.transactions||[]).map(t=>String(t.id)));
      const del=delSet();
      const needPush =
        state.transactions.some(t=>!remoteTxIds.has(String(t.id))) ||        // มีรายการใหม่ที่ชีตยังไม่มี
        (data.transactions||[]).some(t=>del.has(String(t.id))) ||            // ชีตยังมีรายการที่ถูกลบ
        state.students.length>(data.students||[]).length ||
        state.users.length>(data.users||[]).length ||
        state.audit.length>(data.audit||[]).length;
      if(needPush) cloudSave();
      return true;
    }
    // ชีตว่างจริง (ตั้งค่าครั้งแรกเท่านั้น) → อัปโหลดข้อมูลปัจจุบันขึ้นไปเป็นชุดตั้งต้น
    cloudReady=true;
    await cloudPush();
    return true;
  }catch(err){
    console.error('Load error:',err);
    cloudReady=false; // ★ โหลดไม่ได้ → ล็อกไม่ให้เขียนทับชีต จนกว่าจะเชื่อมต่อสำเร็จ
    setSyncStatus('error','⚠️ เชื่อม Google Sheets ไม่ได้ — จะยังไม่บันทึกขึ้นคลาวด์ กดรีเฟรชเพื่อลองใหม่');
    return false;
  }
}

// ── วันเวลาแบบไทย (เขตเวลา Asia/Bangkok + ปีพุทธศักราช) ──
const TH_MONTHS_FULL=['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
const TH_MONTHS_SHORT=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
function thParts(d){
  const f=new Intl.DateTimeFormat('en-GB',{timeZone:'Asia/Bangkok',year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:false});
  const p={};f.formatToParts(d).forEach(x=>{if(x.type!=='literal')p[x.type]=x.value;});
  return {y:+p.year,m:+p.month,d:+p.day,hh:p.hour==='24'?'00':p.hour,mm:p.minute};
}
function fmtDate(d){const p=thParts(d);return String(p.d).padStart(2,'0')+'/'+String(p.m).padStart(2,'0')+'/'+p.y;}       // 02/07/2026
function fmtDateLong(d){const p=thParts(d);return p.d+' '+TH_MONTHS_FULL[p.m-1]+' '+p.y;}                              // 2 กรกฎาคม 2026
function fmtTime(d){const p=thParts(d);return p.hh+':'+p.mm+' น.';}                                                              // 17:02 น.
function todayInput(){const p=thParts(new Date());return p.y+'-'+String(p.m).padStart(2,'0')+'-'+String(p.d).padStart(2,'0');}   // yyyy-mm-dd (สำหรับ input type=date)
function thisMonthInput(){const p=thParts(new Date());return p.y+'-'+String(p.m).padStart(2,'0');}                                // yyyy-mm (สำหรับ input type=month)
// แปลงค่าจาก <input type="date"> (yyyy-mm-dd) → {ts, date(ค.ศ.)}
function fromInputDate(val){
  const [y,mo,da]=String(val).split('-').map(Number);
  if(!y||!mo||!da){const n=new Date();return {ts:n.getTime(),date:fmtDate(n)};}
  const d=new Date(y,mo-1,da,12,0,0);
  return {ts:d.getTime(), date:String(da).padStart(2,'0')+'/'+String(mo).padStart(2,'0')+'/'+y};
}
// แปลงค่าวันที่หลายรูปแบบ → epoch ms (รองรับ พ.ศ./ค.ศ. และรูปแบบที่ Sheets แปลงเอง)
function parseAnyDate(val){
  if(val==null||val==='')return 0;
  if(typeof val==='number'){
    if(val>1e11)return val;                         // epoch ms
    if(val>20000&&val<200000)return Math.round((val-25569)*86400000); // serial ของ Google Sheets
    return 0;
  }
  const s=String(val).trim();
  let m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{3,4})/);          // dd/mm/yyyy
  if(m){let d=+m[1],mo=+m[2],y=+m[3];if(y>=2500)y-=543;const dt=new Date(y,mo-1,d,12,0,0);if(!isNaN(dt.getTime()))return dt.getTime();}
  m=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);                   // yyyy-mm-dd
  if(m){let y=+m[1],mo=+m[2],d=+m[3];if(y>=2500)y-=543;const dt=new Date(y,mo-1,d,12,0,0);if(!isNaN(dt.getTime()))return dt.getTime();}
  const dd=new Date(s);                                        // เช่น "Wed Jul 02 2569 ..." ที่ Sheets แปลงไว้
  if(!isNaN(dd.getTime())){let y=dd.getFullYear(),mo=dd.getMonth(),d=dd.getDate();if(y>=2500)y-=543;return new Date(y,mo,d,12,0,0).getTime();}
  return 0;
}
// หา timestamp ของรายการ (ใช้ ts ก่อน ไม่มีค่อยแปลงจากวันที่)
function txTs(t){
  const ts=Number(t.ts);
  if(ts&&ts>1e11)return ts;
  return parseAnyDate(t.date);
}
function nowStr(){
  const d=new Date();
  return {date:fmtDate(d),time:fmtTime(d),ts:d.getTime()};
}

// แปลงวันที่ที่เก็บเป็น พ.ศ. (ปี ≥ 2500) → ค.ศ. — ปลอดภัยถ้ารันซ้ำ (ค.ศ. จะไม่ถูกแปลงอีก)
function beToCe(dateStr){
  const m=String(dateStr||'').split('/');
  if(m.length!==3)return dateStr;
  let y=+m[2];
  if(isNaN(y))return dateStr;
  if(y>=2500)y-=543;
  return String(+m[0]).padStart(2,'0')+'/'+String(+m[1]).padStart(2,'0')+'/'+y;
}
// ปรับข้อมูลให้เป็นมาตรฐาน: วันที่เป็น ค.ศ. + เติม ts ให้ทุกรายการ (แก้ปัญหารายงานไม่ขึ้นข้ามเครื่อง)
function migrateDatesToCE(){
  let changed=false;
  const fixTx=(arr)=>{(arr||[]).forEach(o=>{
    const ts=txTs(o);                                   // คำนวณจาก ts เดิมหรือจากวันที่
    if(ts && Number(o.ts)!==ts){o.ts=ts;changed=true;}  // เติม/แก้ ts
    if(ts){const nd=fmtDate(new Date(ts));if(o.date!==nd){o.date=nd;changed=true;}} // วันที่เป็น ค.ศ. รูปแบบมาตรฐาน
  });};
  fixTx(state.transactions);
  fixTx(state.withdrawReqs);
  (state.audit||[]).forEach(o=>{if(o.date){const n=beToCe(o.date);if(n!==o.date){o.date=n;changed=true;}}});
  (state.students||[]).forEach(o=>{if(o.openDate){const n=beToCe(o.openDate);if(n!==o.openDate){o.openDate=n;changed=true;}}});
  return changed;
}
function genId(){return Math.random().toString(36).slice(2,10).toUpperCase();}
function money(n){return '฿'+(n||0).toLocaleString('th-TH');}
function can(action){
  const r=state.session?.role;
  if(!r)return false;
  if(r==='admin')return true;
  const map={
    deposit:['finance','teacher'],
    withdraw_request:['finance','teacher'],
    withdraw_approve:['admin','finance'],
    manage_students:['admin','finance'],
    manage_users:['admin'],
    edit_transaction:['admin','finance'],
    view_reports:['admin','finance','director','teacher'],
  };
  return (map[action]||[]).includes(r);
}
function addAudit(action,detail){
  const {date,time}=nowStr();
  state.audit.unshift({id:genId(),action,detail,user:state.session?.name,date,time});
  if(state.audit.length>500)state.audit=state.audit.slice(0,500);
}

}

let toastTimer=null;
function showToast(msg,ok=true){
  let t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';document.body.appendChild(t);}
  t.className='toast '+(ok?'toast-ok':'toast-err');
  t.textContent=(ok?'✅ ':'❌ ')+msg;
  t.style.display='block';
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{t.style.display='none';},2800);
}

    case 'dashboard': attachDashboard();break;
    case 'deposit':   attachDeposit();break;
    case 'withdraw':  attachWithdraw();break;
    case 'students':  attachStudents();break;
    case 'history':   attachHistory();break;
    case 'reports':   attachReports();break;
    case 'users':     attachUsers();break;
    case 'audit':     break;
  }
}

// DASHBOARD
// ══════════════════════════════════════════════════════
function renderDashboard(){
  const vs=visibleStudents();
  const total=vs.reduce((a,s)=>a+s.balance,0);
  const today=nowStr().date;
  const todayTx=state.transactions.filter(t=>t.date===today);
  const todayDep=todayTx.filter(t=>t.type==='deposit').reduce((a,t)=>a+t.amount,0);
  const todayWd=todayTx.filter(t=>t.type==='withdraw').reduce((a,t)=>a+t.amount,0);
  const todayPeople=new Set(todayTx.filter(t=>t.type==='deposit').map(t=>t.studentId)).size;

  // last 7 days chart
  const days=[];
  const maxBar=Math.max(1,...Array.from({length:7},(_,i)=>{
    const d=new Date();d.setDate(d.getDate()-(6-i));
    const ds=fmtDate(d);
    return state.transactions.filter(t=>t.date===ds&&t.type==='deposit').reduce((a,t)=>a+t.amount,0);
  }));
  const barHtml=Array.from({length:7},(_,i)=>{
    const d=new Date();d.setDate(d.getDate()-(6-i));
    const ds=fmtDate(d);
    const p=thParts(d);
    const amt=state.transactions.filter(t=>t.date===ds&&t.type==='deposit').reduce((a,t)=>a+t.amount,0);
    const h=Math.max(2,Math.round((amt/maxBar)*80));
    const lbl=`${p.d}/${p.m}`;
    return `<div class="bar-col"><div class="bar-fill" style="height:${h}px" title="${money(amt)}"></div><div class="bar-lbl">${lbl}</div></div>`;
  }).join('');

  // top 5
  const top5=[...vs].sort((a,b)=>b.balance-a.balance).slice(0,5);
  const topHtml=top5.length?top5.map((s,i)=>{
    const medals=['🥇','🥈','🥉','4','5'];
    return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
      <span style="font-size:15px;width:24px;font-weight:800">${medals[i]}</span>
      <div style="flex:1"><div style="font-size:13px;font-weight:700">${s.prefix}${s.name} ${s.surname}</div>
      <div style="font-size:11px;color:#94a3b8">${s.cls}/${s.room}</div></div>
      <div style="font-size:13px;font-weight:800;color:#16a34a">${money(s.balance)}</div>
    </div>`;
  }).join(''):'<p style="color:#94a3b8;font-size:13px">ยังไม่มีข้อมูล</p>';

  // recent tx
  const recTx=state.transactions.slice(0,8);
  const recRows=recTx.length?recTx.map(t=>{
    const s=state.students.find(x=>x.id===t.studentId);
    const amtHtml=`<span style="font-weight:800;color:${t.type==='deposit'?'#16a34a':'#dc2626'}">${t.type==='deposit'?'+':'-'}${money(t.amount)}</span>`;
    const badge=`<span class="badge badge-${t.type}">${t.type==='deposit'?'ฝาก':'ถอน'}</span>`;
    return `<tr><td>${t.date}</td><td>${t.time}</td>
      <td style="font-weight:700">${s?s.prefix+s.name+' '+s.surname:t.studentId}</td>
      <td>${s?s.cls+'/'+s.room:'-'}</td><td>${badge}</td><td>${amtHtml}</td><td style="color:#94a3b8;font-size:12px">${t.by}</td></tr>`;
  }).join(''):`<tr class="empty-row"><td colspan="7">ยังไม่มีรายการ</td></tr>`;

  return `
  <div class="page-header">
    <div><div class="page-title">ภาพรวมระบบออมเงิน</div>
    <div class="page-sub">${fmtDateLong(new Date())} • ${state.session.name}</div></div>
  </div>
  <div class="stat-grid">
    <div class="stat-card"><div class="icon">💰</div><div class="val">${money(total)}</div><div class="lbl">ยอดออมทั้งหมด</div></div>
    <div class="stat-card"><div class="icon">👨‍🎓</div><div class="val">${vs.length} คน</div><div class="lbl">นักเรียนทั้งหมด</div></div>
    <div class="stat-card"><div class="icon">📥</div><div class="val">${money(todayDep)}</div><div class="lbl">ฝากวันนี้</div><div class="sub">${todayPeople} คน</div></div>
    <div class="stat-card"><div class="icon">📤</div><div class="val">${money(todayWd)}</div><div class="lbl">ถอนวันนี้</div></div>
  </div>
  <div class="two-col">
    <div class="card">
      <div style="font-size:15px;font-weight:700;margin-bottom:12px">📈 ยอดฝาก 7 วันล่าสุด</div>
      <div class="bar-chart">${barHtml}</div>
    </div>
    <div class="card">
      <div style="font-size:15px;font-weight:700;margin-bottom:14px">🏆 ออมสูงสุด</div>
      ${topHtml}
    </div>
  </div>
  <div class="card">
    <div style="font-size:15px;font-weight:700;margin-bottom:14px">รายการล่าสุด</div>
    <div class="table-wrap">
      <table><thead><tr><th>วันที่</th><th>เวลา</th><th>นักเรียน</th><th>ชั้น</th><th>ประเภท</th><th>จำนวน</th><th>บันทึกโดย</th></tr></thead>
      <tbody>${recRows}</tbody></table>
    </div>
  </div>`;
}
function attachDashboard(){}

let depositTab='individual';
let depositSelectedId=null;
let depositAmount='';
let depositNote='';
let depositSearch='';
let depositDate=todayInput();
let batchCls='ป.4';
let batchRoom='1';

function renderDeposit(){
  const vs=visibleStudents();
  const sel=vs.find(s=>s.id===depositSelectedId);
  const filtered=vs.filter(s=>!depositSearch||s.name.includes(depositSearch)||s.surname.includes(depositSearch)||s.id.includes(depositSearch));

  const studentListHtml=filtered.map(s=>`
    <div class="student-row${depositSelectedId===s.id?' selected':''}" data-sid="${s.id}">
      <span style="font-size:22px">${AVATARS[s.prefix]||'🧒'}</span>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:700">${s.prefix}${s.name} ${s.surname}</div>
        <div style="font-size:11px;color:#94a3b8">${s.cls}/${s.room} • ยอด ${money(s.balance)}</div>
      </div>
      ${depositSelectedId===s.id?'<span style="color:#1a3a6b;font-weight:800">✓</span>':''}
    </div>`).join('') || '<div style="padding:20px;text-align:center;color:#94a3b8;font-size:13px">ไม่พบนักเรียน</div>';

  const selectedBox=sel?`
    <div class="info-box blue" style="display:flex;align-items:center;gap:12px;border-radius:12px;padding:12px 14px">
      <span style="font-size:32px">${AVATARS[sel.prefix]||'🧒'}</span>
      <div style="flex:1"><div style="font-weight:800;font-size:15px">${sel.prefix}${sel.name} ${sel.surname}</div>
      <div style="font-size:12px">ยอดปัจจุบัน <strong>${money(sel.balance)}</strong></div></div>
      <button class="btn btn-ghost btn-sm" id="clear-sel">✕</button>
    </div>`:`<div style="background:#f8fafc;border-radius:12px;padding:16px;text-align:center;color:#94a3b8;font-size:13px;margin-bottom:14px">← เลือกนักเรียนจากรายการ</div>`;

  const confirmBox=sel&&depositAmount&&Number(depositAmount)>0?`
    <div class="confirm-box">
      <div class="confirm-row"><span>ยอดปัจจุบัน</span><span>${money(sel.balance)}</span></div>
      <div class="confirm-row"><span>จำนวนที่ฝาก</span><span style="color:#16a34a;font-weight:700">+${money(Number(depositAmount))}</span></div>
      <div class="confirm-total"><span>หลังฝาก</span><span>${money(sel.balance+Number(depositAmount))}</span></div>
    </div>`:'';

  const clsOptions=CLASSES.map(c=>`<option${c===batchCls?' selected':''}>${c}</option>`).join('');
  const roomOptions=ROOMS.map(r=>`<option${r===batchRoom?' selected':''}>ห้อง ${r}</option>`).join('');
  const batchCount=vs.filter(s=>s.cls===batchCls&&s.room===batchRoom).length;

  return `
  <div class="page-header"><div class="page-title">💰 ฝากเงิน</div></div>
  <div class="tab-bar">
    <button class="tab-btn${depositTab==='individual'?' active':''}" data-tab="individual">👤 รายบุคคล</button>
    <button class="tab-btn${depositTab==='batch'?' active':''}" data-tab="batch">👥 ทั้งห้อง</button>
  </div>

  ${depositTab==='individual'?`
  <div class="two-col">
    <div class="card">
      <div style="font-size:15px;font-weight:700;margin-bottom:14px">เลือกนักเรียน</div>
      <input class="search-input" id="dep-search" placeholder="🔍 ชื่อ / รหัส" value="${depositSearch}" style="margin-bottom:12px">
      <div class="student-list-box" id="student-list">${studentListHtml}</div>
    </div>
    <div class="card">
      <div style="font-size:15px;font-weight:700;margin-bottom:14px">บันทึกการฝาก</div>
      ${selectedBox}
      <div class="form-group">
        <label class="form-label">วันที่ฝาก <span class="req">*</span></label>
        <input type="date" class="form-input" id="dep-date" value="${depositDate}">
        <div style="font-size:11px;color:#94a3b8;margin-top:3px">เลือกย้อนหลังหรือล่วงหน้าได้ (ค่าเริ่มต้น = วันนี้)</div>
      </div>
      <div class="form-group">
        <label class="form-label">จำนวนเงิน (บาท) <span class="req">*</span></label>
        <input type="number" class="amount-big" id="dep-amount" placeholder="0" min="1" value="${depositAmount}">
      </div>
      <div class="amount-quick">
        ${[10,20,50,100,200,500].map(v=>`<button class="quick-btn${depositAmount==v?' active':''}" data-v="${v}">฿${v}</button>`).join('')}
      </div>
      <div class="form-group">
        <label class="form-label">หมายเหตุ</label>
        <input class="form-input" id="dep-note" placeholder="บันทึกเพิ่มเติม (ไม่บังคับ)" value="${depositNote}">
      </div>
      ${confirmBox}
      <button class="btn btn-success btn-full btn-lg" id="dep-submit">💾 บันทึกการฝากเงิน</button>
    </div>
  </div>`:`
  <div class="card" style="max-width:500px">
    <div style="font-size:15px;font-weight:700;margin-bottom:16px">เลือกห้องเรียน</div>
    <div class="two-col" style="margin-bottom:16px">
      <div class="form-group" style="margin-bottom:0">
        <label class="form-label">ชั้น</label>
        <select class="form-select" id="batch-cls">${clsOptions}</select>
      </div>
      <div class="form-group" style="margin-bottom:0">
        <label class="form-label">ห้อง</label>
        <select class="form-select" id="batch-room">${roomOptions}</select>
      </div>
    </div>
    <div class="info-box blue">พบนักเรียน <strong>${batchCount} คน</strong> ในชั้น ${batchCls} ห้อง ${batchRoom}</div>
    <button class="btn btn-primary btn-full" id="open-batch">เปิดหน้าฝากทั้งห้อง →</button>
  </div>`}`;
}

function attachDeposit(){
  document.querySelectorAll('.tab-btn[data-tab]').forEach(b=>{
    b.onclick=()=>{depositTab=b.dataset.tab;document.getElementById('content').innerHTML=renderDeposit();attachDeposit();};
  });
  if(depositTab==='individual'){
    const depSearch=document.getElementById('dep-search');
    depSearch.oninput=()=>{depositSearch=depSearch.value;document.getElementById('content').innerHTML=renderDeposit();attachDeposit();};
    document.getElementById('student-list')?.addEventListener('click',e=>{
      const row=e.target.closest('.student-row');
      if(row){depositSelectedId=row.dataset.sid;depositSearch='';document.getElementById('content').innerHTML=renderDeposit();attachDeposit();}
    });
    document.getElementById('clear-sel')?.addEventListener('click',()=>{depositSelectedId=null;document.getElementById('content').innerHTML=renderDeposit();attachDeposit();});
    const amtInput=document.getElementById('dep-amount');
    amtInput?.addEventListener('input',()=>{depositAmount=amtInput.value;document.getElementById('content').innerHTML=renderDeposit();attachDeposit();});
    document.querySelectorAll('.quick-btn').forEach(b=>{
      b.onclick=()=>{depositAmount=b.dataset.v;document.getElementById('content').innerHTML=renderDeposit();attachDeposit();};
    });
    const noteInput=document.getElementById('dep-note');
    noteInput?.addEventListener('input',()=>{depositNote=noteInput.value;});
    const dateInput=document.getElementById('dep-date');
    dateInput?.addEventListener('change',()=>{depositDate=dateInput.value;});
    document.getElementById('dep-submit')?.addEventListener('click',()=>{
      const vs=visibleStudents();
      const sel=vs.find(s=>s.id===depositSelectedId);
      if(!sel){showToast('กรุณาเลือกนักเรียน',false);return;}
      const amt=Number(document.getElementById('dep-amount').value);
      const note=document.getElementById('dep-note').value;
      if(!amt||amt<=0){showToast('กรุณากรอกจำนวนเงิน',false);return;}
      const dv=document.getElementById('dep-date').value||todayInput();
      const {ts,date}=fromInputDate(dv);
      const time=fmtTime(new Date());
      state.transactions.unshift({id:genId(),studentId:sel.id,type:'deposit',amount:amt,note,by:state.session.name,date,time,ts});
      state.students=state.students.map(s=>s.id===sel.id?{...s,balance:s.balance+amt}:s);
      addAudit('DEPOSIT',`ฝากเงิน ${money(amt)} → ${sel.name} ${sel.surname} (${date})`);
      save();
      depositSelectedId=null;depositAmount='';depositNote='';depositSearch='';depositDate=todayInput();
      showToast(`ฝากเงิน ${money(amt)} สำเร็จ`);
      document.getElementById('content').innerHTML=renderDeposit();attachDeposit();
    });
  } else {
    document.getElementById('batch-cls')?.addEventListener('change',e=>{batchCls=e.target.value;document.getElementById('content').innerHTML=renderDeposit();attachDeposit();});
    document.getElementById('batch-room')?.addEventListener('change',e=>{
      batchRoom=e.target.value.replace('ห้อง ','');
      document.getElementById('content').innerHTML=renderDeposit();attachDeposit();
    });
    document.getElementById('open-batch')?.addEventListener('click',()=>{
      const vs=visibleStudents().filter(s=>s.cls===batchCls&&s.room===batchRoom);
      if(!vs.length){showToast('ไม่มีนักเรียนในห้องนี้',false);return;}
      openModal(renderBatchModal(vs),()=>attachBatchModal(vs));
    });
  }
}

function renderBatchModal(students){
  const rows=students.map(s=>`
    <tr><td>${s.no}</td>
    <td style="font-weight:700">${s.prefix}${s.name} ${s.surname}</td>
    <td style="color:#16a34a;font-weight:700">${money(s.balance)}</td>
    <td><input type="number" class="batch-amt" data-sid="${s.id}" placeholder="0" min="0"
      style="width:90px;padding:6px 10px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:14px;text-align:center;font-family:inherit"></td></tr>`).join('');
  return `<div class="modal-head"><h3>💰 ฝากเงินทั้งห้อง (${students.length} คน)</h3><button class="modal-close" id="modal-close-btn">✕</button></div>
  <div class="modal-body">
    <div class="form-group">
      <label class="form-label">วันที่ฝาก</label>
      <input type="date" class="form-input" id="batch-date" value="${todayInput()}">
    </div>
    <div class="table-wrap"><table><thead><tr><th>ที่</th><th>ชื่อ-นามสกุล</th><th>ยอดปัจจุบัน</th><th>จำนวนเงิน (฿)</th></tr></thead><tbody>${rows}</tbody></table></div>
    <div class="confirm-box" id="batch-summary" style="margin-top:14px">
      <div class="confirm-row"><span>จำนวนที่กรอก</span><span id="batch-count">0 คน</span></div>
      <div class="confirm-total"><span>ยอดรวม</span><span id="batch-total">฿0</span></div>
    </div>
    <button class="btn btn-success btn-full btn-lg" id="batch-save" style="margin-top:4px">💾 บันทึกทั้งห้อง</button>
  </div>`;
}
function attachBatchModal(students){
  const updateSummary=()=>{
    let total=0,count=0;
    document.querySelectorAll('.batch-amt').forEach(i=>{const v=Number(i.value);if(v>0){total+=v;count++;}});
    document.getElementById('batch-count').textContent=count+' คน';
    document.getElementById('batch-total').textContent=money(total);
  };
  document.querySelectorAll('.batch-amt').forEach(i=>i.addEventListener('input',updateSummary));
  document.getElementById('batch-save')?.addEventListener('click',()=>{
    const entries=[];
    document.querySelectorAll('.batch-amt').forEach(i=>{const v=Number(i.value);if(v>0)entries.push({studentId:i.dataset.sid,amount:v});});
    if(!entries.length){showToast('กรุณากรอกจำนวนเงินอย่างน้อย 1 คน',false);return;}
    const dv=document.getElementById('batch-date')?.value||todayInput();
    const {ts,date}=fromInputDate(dv);
    const time=fmtTime(new Date());
    entries.forEach(e=>{
      const s=students.find(x=>x.id===e.studentId);
      state.transactions.unshift({id:genId(),studentId:e.studentId,type:'deposit',amount:e.amount,note:'ฝากพร้อมกัน',by:state.session.name,date,time,ts});
      state.students=state.students.map(x=>x.id===e.studentId?{...x,balance:x.balance+e.amount}:x);
    });
    addAudit('BATCH_DEPOSIT',`ฝากพร้อมกัน ${entries.length} คน (${date})`);
    save();closeModal();
    showToast(`บันทึกการฝาก ${entries.length} คนสำเร็จ`);
    document.getElementById('content').innerHTML=renderDeposit();attachDeposit();
  });
}

// WITHDRAW

let wTab='request';
let wSelId=null;
let wSearch='';
let wAmt='';
let wReason='';

function renderWithdraw(){
  const vs=visibleStudents();
  const sel=vs.find(s=>s.id===wSelId);
  const filt=vs.filter(s=>!wSearch||s.name.includes(wSearch)||s.surname.includes(wSearch));
  const pending=state.withdrawReqs.filter(r=>r.status==='pending').length;

  const studentListHtml=filt.map(s=>`
    <div class="student-row${wSelId===s.id?' selected':''}" data-sid="${s.id}">
      <span style="font-size:20px">${AVATARS[s.prefix]||'🧒'}</span>
      <div style="flex:1"><div style="font-size:13px;font-weight:700">${s.prefix}${s.name} ${s.surname}</div>
      <div style="font-size:11px;color:#94a3b8">ยอด ${money(s.balance)}</div></div>
      ${wSelId===s.id?'<span style="color:#dc2626;font-weight:800">✓</span>':''}
    </div>`).join('')||'<div style="padding:20px;text-align:center;color:#94a3b8">ไม่พบ</div>';

  const warnBox=sel&&wAmt&&Number(wAmt)>sel.balance?
    `<div class="info-box" style="background:#fee2e2;border:1.5px solid #fca5a5;color:#dc2626">⚠️ ยอดเงินไม่เพียงพอ (มี ${money(sel.balance)})</div>`:'';
  const afterWd=sel&&wAmt&&Number(wAmt)>0&&Number(wAmt)<=sel.balance?
    `<div class="confirm-box warn"><div class="confirm-row"><span>ยอดปัจจุบัน</span><span>${money(sel.balance)}</span></div>
    <div class="confirm-total warn"><span>หลังถอน</span><span>${money(sel.balance-Number(wAmt))}</span></div></div>`:'';

  const reasonOpts=['-- เลือกเหตุผล --','ค่าใช้จ่ายฉุกเฉิน','ปิดบัญชีสิ้นปีการศึกษา','ค่าธรรมเนียมการศึกษา','ค่าอุปกรณ์การเรียน','อื่น ๆ']
    .map(r=>`<option${r===wReason?' selected':''}>${r}</option>`).join('');

  const reqRows=state.withdrawReqs.map(r=>{
    const s=state.students.find(x=>x.id===r.studentId);
    const actBtns=r.status==='pending'&&can('withdraw_approve')?
      `<button class="btn btn-success btn-sm approve-btn" data-id="${r.id}">✓</button>
       <button class="btn btn-danger btn-sm reject-btn" data-id="${r.id}" style="margin-left:4px">✕</button>`
      :`<span style="font-size:11px;color:#94a3b8">${r.resolvedBy||''}</span>`;
    return `<tr>
      <td>${r.date}</td>
      <td style="font-weight:700">${s?s.prefix+s.name:r.studentId}</td>
      <td style="font-weight:800;color:#dc2626">${money(r.amount)}</td>
      <td style="font-size:12px">${r.reason}</td>
      <td style="font-size:12px">${r.requestBy}</td>
      <td><span class="badge badge-${r.status}">${{pending:'รออนุมัติ',approved:'อนุมัติ',rejected:'ปฏิเสธ'}[r.status]}</span></td>
      <td>${actBtns}</td></tr>`;
  }).join('')||`<tr class="empty-row"><td colspan="7">ไม่มีคำขอ</td></tr>`;

  return `
  <div class="page-header"><div class="page-title">💸 ถอนเงิน</div></div>
  <div class="tab-bar">
    ${can('withdraw_request')?`<button class="tab-btn${wTab==='request'?' active':''}" data-wtab="request">📤 ขอถอนเงิน</button>`:''}
    <button class="tab-btn${wTab==='list'?' active':''}" data-wtab="list">📋 รายการคำขอ${pending?`<span class="pending-count">${pending}</span>`:''}</button>
  </div>

  ${wTab==='request'&&can('withdraw_request')?`
  <div class="two-col">
    <div class="card">

function attachWithdraw(){
  document.querySelectorAll('.tab-btn[data-wtab]').forEach(b=>{
    b.onclick=()=>{wTab=b.dataset.wtab;document.getElementById('content').innerHTML=renderWithdraw();attachWithdraw();};
  });
  if(wTab==='request'){
    document.getElementById('w-search')?.addEventListener('input',e=>{wSearch=e.target.value;document.getElementById('content').innerHTML=renderWithdraw();attachWithdraw();});
    document.getElementById('w-student-list')?.addEventListener('click',e=>{
      const row=e.target.closest('.student-row');
      if(row){wSelId=row.dataset.sid;wSearch='';document.getElementById('content').innerHTML=renderWithdraw();attachWithdraw();}
    });
    document.getElementById('w-amt')?.addEventListener('input',e=>{wAmt=e.target.value;document.getElementById('content').innerHTML=renderWithdraw();attachWithdraw();});
    document.getElementById('w-reason')?.addEventListener('change',e=>{wReason=e.target.value;});
    document.getElementById('w-submit')?.addEventListener('click',()=>{
      const vs=visibleStudents();
      const sel=vs.find(s=>s.id===wSelId);
      const amt=Number(document.getElementById('w-amt').value);
      const reason=document.getElementById('w-reason').value;
      if(!sel){showToast('กรุณาเลือกนักเรียน',false);return;}
      if(!amt||amt<=0){showToast('กรุณากรอกจำนวนเงิน',false);return;}
      if(reason==='-- เลือกเหตุผล --'){showToast('กรุณาเลือกเหตุผล',false);return;}
      if(amt>sel.balance){showToast('ยอดเงินไม่เพียงพอ',false);return;}
      const {date,time}=nowStr();
      state.withdrawReqs.unshift({id:genId(),studentId:sel.id,amount:amt,reason,status:'pending',requestBy:state.session.name,date,time});
      addAudit('WITHDRAW_REQUEST',`ขอถอน ${money(amt)} จาก ${sel.name} ${sel.surname}`);
      save();
      wSelId=null;wAmt='';wReason='';wSearch='';
      showToast('ส่งคำขอถอนเงินแล้ว รอการอนุมัติ');
      wTab='list';
      document.getElementById('content').innerHTML=renderWithdraw();attachWithdraw();
    });
  }
  if(wTab==='list'){
    document.querySelectorAll('.approve-btn').forEach(b=>{
      b.onclick=()=>{
        const r=state.withdrawReqs.find(x=>x.id===b.dataset.id);
        if(!r)return;
        const s=state.students.find(x=>x.id===r.studentId);
        const {date,time,ts}=nowStr();
        state.transactions.unshift({id:genId(),studentId:r.studentId,type:'withdraw',amount:r.amount,note:r.reason,by:state.session.name,date,time,ts});
        state.students=state.students.map(x=>x.id===r.studentId?{...x,balance:x.balance-r.amount}:x);
        state.withdrawReqs=state.withdrawReqs.map(x=>x.id===r.id?{...x,status:'approved',resolvedBy:state.session.name}:x);
        addAudit('WITHDRAW_APPROVE',`อนุมัติถอน ${money(r.amount)} จาก ${s?.name||r.studentId}`);
        save();showToast('อนุมัติการถอนเงินแล้ว');
        document.getElementById('content').innerHTML=renderWithdraw();attachWithdraw();
      };
    });
    document.querySelectorAll('.reject-btn').forEach(b=>{
      b.onclick=()=>{
        state.withdrawReqs=state.withdrawReqs.map(x=>x.id===b.dataset.id?{...x,status:'rejected',resolvedBy:state.session.name}:x);
        addAudit('WITHDRAW_REJECT',`ปฏิเสธคำขอถอน ${b.dataset.id}`);
        save();showToast('ปฏิเสธคำขอแล้ว',false);
        document.getElementById('content').innerHTML=renderWithdraw();attachWithdraw();
      };
    });
  }
}

let importParsed=null; // เก็บผลการอ่านไฟล์ไว้ก่อนยืนยัน

// แปลงคำนำหน้าเต็ม → ตัวย่อในระบบ (ตรวจตัวยาวก่อนตัวสั้น)
const PREFIX_RULES=[
  ['เด็กชาย','ด.ช.'],['เด็กหญิง','ด.ญ.'],
  ['นางสาว','นางสาว'],['นาย','นาย'],['นาง','นาง'],
  ['ด.ช.','ด.ช.'],['ด.ญ.','ด.ญ.'],['เด็ก','ด.ช.'],
];

function parseStudentName(full){
  let s=String(full||'').replace(/\s+/g,' ').trim();
  let prefix='';
  for(const [k,v] of PREFIX_RULES){ if(s.startsWith(k)){prefix=v;s=s.slice(k.length).trim();break;} }
  const parts=s.split(' ').filter(Boolean);
  const name=parts.shift()||'';
  const surname=parts.join(' ');
  return {prefix,name,surname};
}

// อ่านเวิร์กบุ๊ก แล้วดึงนักเรียนจากทุกชีตที่ชื่อตรงกับชั้นเรียน
function extractStudentsFromWorkbook(wb){
  const found=[];
  wb.SheetNames.forEach(sheetName=>{
    const cls=CLASSES.find(c=>c===sheetName.trim());
    if(!cls) return; // ข้ามชีตที่ไม่ใช่ชั้นเรียน (รวม, ผปค. ฯลฯ)
    const ws=wb.Sheets[sheetName];
    const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
    rows.forEach(r=>{
      const no=parseInt(r[0]);
      const code=String(r[1]||'').trim();      // เลขประจำตัวนักเรียน
      const full=String(r[3]||'').trim();       // ชื่อ – นามสกุล
      if(!Number.isFinite(no)||!full) return;   // ข้ามหัวตาราง/แถวว่าง
      const {prefix,name,surname}=parseStudentName(full);
      if(!prefix||!name) return;                // ไม่ใช่แถวนักเรียน
      found.push({no,code,prefix,name,surname,cls});
    });
  });
  return found;
}

function attachImportModal(){
  importParsed=null;
  document.getElementById('modal-close-btn2')?.addEventListener('click',closeModal);
  const confirmBtn=document.getElementById('imp-confirm');
  const preview=document.getElementById('imp-preview');

  document.getElementById('imp-file')?.addEventListener('change',ev=>{
    const file=ev.target.files[0];
    if(!file)return;
    if(typeof XLSX==='undefined'){
      preview.innerHTML='<div style="color:#dc2626;font-size:13px;padding:8px">⚠️ โหลดตัวอ่าน Excel ไม่สำเร็จ ตรวจสอบอินเทอร์เน็ตแล้วลองใหม่</div>';
      return;
    }
    preview.innerHTML='<div style="color:#64748b;font-size:13px;padding:8px">⏳ กำลังอ่านไฟล์...</div>';
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
        const rows=extractStudentsFromWorkbook(wb);
        if(rows.length===0){
          preview.innerHTML='<div style="color:#dc2626;font-size:13px;padding:8px">ไม่พบข้อมูลนักเรียน — ตรวจสอบว่าชื่อชีตเป็นชั้นเรียน เช่น อ.2 ป.1</div>';
          confirmBtn.disabled=true;confirmBtn.style.opacity=.5;importParsed=null;
          return;
        }
        // แยกซ้ำ: ถ้าเลขประจำตัวหรือชื่อ+ชั้นมีอยู่แล้ว = ข้าม
        const existCodes=new Set(state.students.map(s=>s.accountNo));
        const existKeys=new Set(state.students.map(s=>s.name+'|'+s.surname+'|'+s.cls));
        const fresh=[], dups=[];
        rows.forEach(r=>{
          const key=r.name+'|'+r.surname+'|'+r.cls;
          if((r.code&&existCodes.has(r.code))||existKeys.has(key)) dups.push(r);
          else fresh.push(r);
        });
        importParsed=fresh;

        // สรุปแยกตามชั้น
        const byCls={};
        rows.forEach(r=>{byCls[r.cls]=(byCls[r.cls]||0)+1;});
        const clsRows=CLASSES.filter(c=>byCls[c]).map(c=>`<span style="display:inline-block;background:#eff6ff;color:#1e40af;border-radius:8px;padding:3px 10px;margin:2px;font-size:12px;font-weight:600">${c}: ${byCls[c]}</span>`).join('');

        preview.innerHTML=`
          <div style="border:1px solid var(--gray-border);border-radius:10px;padding:14px;margin-bottom:8px">
            <div style="font-weight:700;margin-bottom:8px">พบนักเรียน ${rows.length} คน จาก ${Object.keys(byCls).length} ชั้น</div>
            <div style="margin-bottom:10px">${clsRows}</div>
            <div style="font-size:13px;color:#16a34a;font-weight:700">✅ นำเข้าใหม่ ${fresh.length} คน</div>
            ${dups.length?`<div style="font-size:13px;color:#d97706;font-weight:700;margin-top:2px">⏭️ มีอยู่แล้ว (ข้าม) ${dups.length} คน</div>`:''}
          </div>`;
        confirmBtn.disabled=fresh.length===0;
        confirmBtn.style.opacity=fresh.length===0?.5:1;
      }catch(err){
        console.error(err);
        preview.innerHTML='<div style="color:#dc2626;font-size:13px;padding:8px">อ่านไฟล์ไม่สำเร็จ — ไฟล์อาจเสียหายหรือไม่ใช่ .xlsx</div>';
        confirmBtn.disabled=true;confirmBtn.style.opacity=.5;importParsed=null;
      }
    };

    const {date}=nowStr();
    importParsed.forEach(r=>{
      state.students.push({
        id:genId(),
        no:r.no,
        prefix:r.prefix,
        name:r.name,
        surname:r.surname,
        cls:r.cls,
        room:'1',
        balance:0,
        dob:'',
        parentPhone:'',

}

let hType='';

      </td>`:''}

      <table><thead><tr><th>วันที่</th><th>เวลา</th><th>นักเรียน</th><th>ชั้น</th><th>ประเภท</th><th>จำนวน</th><th>หมายเหตุ</th><th>บันทึกโดย</th>${canEdit?'<th>จัดการ</th>':''}</tr></thead>

function attachHistory(){
  document.getElementById('h-type')?.addEventListener('change',e=>{hType=e.target.value;document.getElementById('content').innerHTML=renderHistory();attachHistory();});
  document.getElementById('h-stu')?.addEventListener('change',e=>{hStuId=e.target.value;document.getElementById('content').innerHTML=renderHistory();attachHistory();});
  document.getElementById('h-date')?.addEventListener('input',e=>{hDate=e.target.value;document.getElementById('content').innerHTML=renderHistory();attachHistory();});
  document.getElementById('h-reset')?.addEventListener('click',()=>{hType='';hDate='';hStuId='';document.getElementById('content').innerHTML=renderHistory();attachHistory();});
  document.querySelectorAll('.edit-tx-btn').forEach(b=>{
    b.onclick=()=>{const t=state.transactions.find(x=>x.id===b.dataset.tid);if(t)openModal(renderTxEditModal(t),()=>attachTxEditModal(t));};
  });
  document.querySelectorAll('.del-tx-btn').forEach(b=>{
    b.onclick=()=>{
      const t=state.transactions.find(x=>x.id===b.dataset.tid);
      if(!t)return;
      const s=state.students.find(x=>x.id===t.studentId);
      if(!confirm(`ยืนยันลบรายการ${t.type==='deposit'?'ฝาก':'ถอน'} ${money(t.amount)}${s?' ของ '+s.name:''}?\nยอดเงินของนักเรียนจะถูกปรับกลับให้อัตโนมัติ`))return;
      // ปรับยอดกลับ: ถ้าลบรายการฝาก ให้หักออก / ถ้าลบรายการถอน ให้คืนเข้า
      if(s){
        const delta=t.type==='deposit'?-t.amount:t.amount;
        state.students=state.students.map(x=>x.id===s.id?{...x,balance:x.balance+delta}:x);
      }
      state.transactions=state.transactions.filter(x=>x.id!==t.id);
      addTombstone(t.id); // กันไม่ให้ merge ดึงรายการที่ลบกลับมา
      addAudit('DELETE_TX',`ลบรายการ${t.type==='deposit'?'ฝาก':'ถอน'} ${money(t.amount)}${s?' ของ '+s.name+' '+s.surname:''} [del:${t.id}]`);
      save();showToast('ลบรายการแล้ว');
      document.getElementById('content').innerHTML=renderHistory();attachHistory();
    };
  });
}

    </div>

    <div class="two-col" style="gap:10px;margin-top:8px">
      <button class="btn btn-ghost btn-full" id="modal-close-btn2">ยกเลิก</button>
      <button class="btn btn-success btn-full" id="tx-save">บันทึกการแก้ไข</button>

function attachTxEditModal(t){
  document.getElementById('modal-close-btn2')?.addEventListener('click',closeModal);
  document.getElementById('tx-save')?.addEventListener('click',()=>{
    const newAmt=Number(document.getElementById('tx-amount').value);
    if(!newAmt||newAmt<=0){showToast('กรุณากรอกจำนวนเงิน',false);return;}
    const dv=document.getElementById('tx-date').value||todayInput();
    const note=document.getElementById('tx-note').value;
    const {ts,date}=fromInputDate(dv);
    const s=state.students.find(x=>x.id===t.studentId);
    // ปรับยอดตามส่วนต่าง: ฝาก → +ส่วนต่าง, ถอน → -ส่วนต่าง
    if(s){
      const diff=newAmt-t.amount;
      const delta=t.type==='deposit'?diff:-diff;
      state.students=state.students.map(x=>x.id===s.id?{...x,balance:x.balance+delta}:x);
    }
    state.transactions=state.transactions.map(x=>x.id===t.id?{...x,amount:newAmt,note,date,ts}:x);
    addAudit('EDIT_TX',`แก้ไขรายการ${t.type==='deposit'?'ฝาก':'ถอน'} ${money(t.amount)}→${money(newAmt)}${s?' ('+s.name+')':''}`);
    save();closeModal();
    showToast('แก้ไขรายการแล้ว');
    document.getElementById('content').innerHTML=renderHistory();attachHistory();
  });
}

// REPORTS
// ══════════════════════════════════════════════════════
let reportPeriod='day'; // day | week | month

// ── รายงานยอดฝากรายบุคคล ──
let psMode='month';                 // day | month
let psDate=todayInput();            // yyyy-mm-dd (โหมดรายวัน)
let psMonth=thisMonthInput();       // yyyy-mm (โหมดรายเดือน)
let psCls='';                       // '' = ทุกชั้น

// คีย์วันที่/เดือนของรายการ (ตามเวลาไทย)
function txKeys(t){
  const ts=txTs(t); if(!ts)return null;
  const p=thParts(new Date(ts));
  return {
    ymd:p.y+'-'+String(p.m).padStart(2,'0')+'-'+String(p.d).padStart(2,'0'),
    ym:p.y+'-'+String(p.m).padStart(2,'0'),
    day:p.d, y:p.y, m:p.m
  };
}

// คำนวณข้อมูลรายงานรายบุคคลตามช่วงที่เลือก
function psData(){
  const vs=visibleStudents().filter(s=>!psCls||s.cls===psCls)
    .sort((a,b)=>(a.cls===b.cls?(a.no||0)-(b.no||0):CLASSES.indexOf(a.cls)-CLASSES.indexOf(b.cls)));
  const deps=state.transactions.filter(t=>t.type==='deposit');
  if(psMode==='day'){
    const rows=vs.map(s=>{
      const amt=deps.filter(t=>t.studentId===s.id&&(txKeys(t)||{}).ymd===psDate).reduce((a,t)=>a+t.amount,0);
      return {s,amt};
    });
    return {rows};
  }
  const monthDeps=deps.filter(t=>(txKeys(t)||{}).ym===psMonth);
  const activeDays=[...new Set(monthDeps.map(t=>txKeys(t).day))].sort((a,b)=>a-b);
  const rows=vs.map(s=>{
    const byDay={}; let total=0;
    monthDeps.filter(t=>t.studentId===s.id).forEach(t=>{const d=txKeys(t).day;byDay[d]=(byDay[d]||0)+t.amount;total+=t.amount;});
    return {s,byDay,total};
  });
  return {rows,activeDays};
}

function psPeriodLabel(){
  if(psMode==='day'){return fmtDateLong(new Date(fromInputDate(psDate).ts));}
  const [y,m]=psMonth.split('-').map(Number);
  return 'เดือน'+TH_MONTHS_FULL[m-1]+' '+y;
}

// สร้างตารางรายงาน (ใช้ inline style เพื่อให้จับภาพ/พิมพ์ออกมาสวยเหมือนกัน)
function psTableHTML(print){
  const d=psData();
  const bd=print?'1px solid #94a3b8':'1px solid #e2e8f0';
  const th=`padding:7px 8px;border:${bd};background:#1a3a6b;color:#fff;font-weight:700;font-size:${print?'13px':'12px'};white-space:nowrap`;
  const td=`padding:6px 8px;border:${bd};font-size:${print?'13px':'12px'}`;
  if(psMode==='day'){
    let grand=0;
    const body=d.rows.map((r,i)=>{grand+=r.amt;return `<tr>
      <td style="${td};text-align:center">${i+1}</td>
      <td style="${td}">${r.s.prefix}${r.s.name} ${r.s.surname}</td>
      <td style="${td};text-align:center">${r.s.cls}/${r.s.room}</td>
      <td style="${td};text-align:right;font-weight:700;color:#16a34a">${r.amt?money(r.amt):'-'}</td>
      <td style="${td};text-align:right">${money(r.s.balance)}</td>
    </tr>`;}).join('');
    return `<table style="border-collapse:collapse;width:100%">
      <thead><tr><th style="${th};text-align:center">ที่</th><th style="${th}">ชื่อ-นามสกุล</th><th style="${th}">ชั้น</th><th style="${th};text-align:right">ยอดฝากวันนี้</th><th style="${th};text-align:right">ยอดคงเหลือ</th></tr></thead>
      <tbody>${body||`<tr><td style="${td}" colspan="5">ไม่มีข้อมูล</td></tr>`}</tbody>
      <tfoot><tr>
        <td style="${td};text-align:right;font-weight:800" colspan="3">รวมทั้งสิ้น</td>
        <td style="${td};text-align:right;font-weight:800;color:#16a34a">${money(grand)}</td>
        <td style="${td}"></td>
      </tr></tfoot>
    </table>`;
  }
  // เดือน — เมทริกซ์รายวัน + รวมเดือน
  const days=d.activeDays;
  const dayCols=days.map(dd=>`<th style="${th};text-align:right">${dd}</th>`).join('');
  const dayFootTotals={}; let grand=0;
  const body=d.rows.map((r,i)=>{
    const cells=days.map(dd=>{const v=r.byDay[dd]||0;dayFootTotals[dd]=(dayFootTotals[dd]||0)+v;return `<td style="${td};text-align:right">${v?money(v):'-'}</td>`;}).join('');
    grand+=r.total;
    return `<tr>
      <td style="${td};text-align:center">${i+1}</td>
      <td style="${td};white-space:nowrap">${r.s.prefix}${r.s.name} ${r.s.surname}</td>
      <td style="${td};text-align:center">${r.s.cls}/${r.s.room}</td>
      ${cells}
      <td style="${td};text-align:right;font-weight:800;color:#16a34a">${r.total?money(r.total):'-'}</td>
      <td style="${td};text-align:right">${money(r.s.balance)}</td>
    </tr>`;
  }).join('');
  const footDays=days.map(dd=>`<td style="${td};text-align:right;font-weight:700">${dayFootTotals[dd]?money(dayFootTotals[dd]):'-'}</td>`).join('');
  return `<table style="border-collapse:collapse;width:100%">
    <thead><tr>
      <th style="${th};text-align:center">ที่</th><th style="${th}">ชื่อ-นามสกุล</th><th style="${th}">ชั้น</th>
      ${dayCols||`<th style="${th}">-</th>`}
      <th style="${th};text-align:right">รวมเดือน</th><th style="${th};text-align:right">คงเหลือ</th>
    </tr></thead>
    <tbody>${body||`<tr><td style="${td}" colspan="${days.length+5}">ไม่มีข้อมูล</td></tr>`}</tbody>
    <tfoot><tr>
      <td style="${td};text-align:right;font-weight:800" colspan="3">รวมแต่ละวัน</td>
      ${footDays||`<td style="${td}"></td>`}
      <td style="${td};text-align:right;font-weight:800;color:#16a34a">${money(grand)}</td>
      <td style="${td}"></td>
    </tr></tfoot>
  </table>`;
}

async function exportReport(kind){
  if(typeof html2canvas==='undefined'||!window.jspdf){showToast('กำลังโหลดตัวส่งออก ลองอีกครั้งในอีกครู่',false);return;}
  showToast('กำลังสร้างรายงาน...');
  const wide = psMode==='month';
  const d=psData();
  const docW = wide ? Math.max(1000, 380 + (d.activeDays?.length||0)*64 + 200) : 900;
  const holder=document.createElement('div');
  holder.style.cssText='position:fixed;left:-99999px;top:0;z-index:-1;';
  holder.innerHTML=`<div id="rep-doc" style="width:${docW}px;background:#fff;padding:34px 30px;font-family:Sarabun,sans-serif;color:#111">${buildReportDoc()}</div>`;
  document.body.appendChild(holder);
  try{
    await new Promise(r=>setTimeout(r,150)); // รอฟอนต์เรนเดอร์
    const canvas=await html2canvas(holder.querySelector('#rep-doc'),{scale:2,backgroundColor:'#ffffff'});
    if(kind==='png'){
      const a=document.createElement('a');
      a.href=canvas.toDataURL('image/png');
      a.download=reportFileName()+'.png';
      document.body.appendChild(a);a.click();a.remove();
    }else{
      const {jsPDF}=window.jspdf;
      const pdf=new jsPDF({orientation:wide?'l':'p',unit:'mm',format:'a4'});
      const margin=8;
      const pw=pdf.internal.pageSize.getWidth(), ph=pdf.internal.pageSize.getHeight();
      const iw=pw-margin*2;
      const pxPerMm=canvas.width/iw;
      const pageHpx=(ph-margin*2)*pxPerMm;
      let sy=0, first=true;
      while(sy<canvas.height){
        const sliceH=Math.min(pageHpx,canvas.height-sy);
        const c2=document.createElement('canvas');c2.width=canvas.width;c2.height=sliceH;
        c2.getContext('2d').drawImage(canvas,0,sy,canvas.width,sliceH,0,0,canvas.width,sliceH);
        if(!first)pdf.addPage();
        pdf.addImage(c2.toDataURL('image/png'),'PNG',margin,margin,iw,sliceH/pxPerMm);
        first=false; sy+=sliceH;
      }
      pdf.save(reportFileName()+'.pdf');
    }
    showToast('ส่งออกรายงานสำเร็จ');
  }catch(e){console.error(e);showToast('ส่งออกไม่สำเร็จ ลองใหม่อีกครั้ง',false);}
  finally{holder.remove();}
}


// จัดกลุ่มรายการฝากตามช่วงเวลา → [{key,label,count,total,ts}] เรียงล่าสุดก่อน
function groupDeposits(period){
  const deps=state.transactions.filter(t=>t.type==='deposit');
  const groups={};
  deps.forEach(t=>{
    const ts=txTs(t);
    if(!ts)return;
    const d=new Date(ts);
    const p=thParts(d);
    let key,label,sortTs;
    if(period==='day'){
      key=`${p.y}-${p.m}-${p.d}`;
      label=`${p.d} ${TH_MONTHS_SHORT[p.m-1]} ${p.y}`;
      sortTs=new Date(p.y,p.m-1,p.d).getTime();
    }else if(period==='month'){
      key=`${p.y}-${p.m}`;
      label=`${TH_MONTHS_FULL[p.m-1]} ${p.y}`;
      sortTs=new Date(p.y,p.m-1,1).getTime();
    }else{ // week (จันทร์–อาทิตย์)
      const base=new Date(p.y,p.m-1,p.d);
      const dow=(base.getDay()+6)%7; // 0=จันทร์
      const mon=new Date(base); mon.setDate(base.getDate()-dow);
      const sun=new Date(mon); sun.setDate(mon.getDate()+6);
      key=`${mon.getFullYear()}-${mon.getMonth()}-${mon.getDate()}`;
      const mp=thParts(mon), sp=thParts(sun);
      label=`${mp.d} ${TH_MONTHS_SHORT[mp.m-1]} – ${sp.d} ${TH_MONTHS_SHORT[sp.m-1]} ${sp.y}`;
      sortTs=mon.getTime();
    }
    if(!groups[key])groups[key]={key,label,count:0,total:0,sortTs};
    groups[key].count++;
    groups[key].total+=t.amount;
  });
  return Object.values(groups).sort((a,b)=>b.sortTs-a.sortTs);
}

      <table><thead><tr><th>วันที่</th><th>เวลา</th><th>ผู้ใช้</th><th>การกระทำ</th><th>รายละเอียด</th></tr></thead>
      <tbody>${rows}</tbody></table>
    </div>
  </div>`;
}

// ══════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════
(async function init(){
  migrateDatesToCE();       // แปลงข้อมูลในเครื่อง (ถ้าเป็น พ.ศ.) → ค.ศ. ก่อนแสดงผล
  syncDeletedFromAudit();   // เรียนรู้รายการที่ถูกลบ (จาก audit ในเครื่อง)
  state.transactions=dropTombstoned(state.transactions);
  purgeDemoStudents();      // ล้างนักเรียนตัวอย่างในเครื่อง
  render();
  const loaded=await cloudLoad(); // ดึงข้อมูลล่าสุดจาก Google Sheets
  const changed=migrateDatesToCE(); // แปลงข้อมูลที่ดึงจากชีต (ถ้ายังเป็น พ.ศ.)
  const purged=purgeDemoStudents(); // ล้างนักเรียนตัวอย่างที่อาจมากับชีต/merge
  if((changed||purged) && cloudReady) save(); // เขียนข้อมูลที่แก้แล้วกลับขึ้นชีตให้ถาวร
  render();
  if(!API_URL) setSyncStatus('off');
})();
</script>
